<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองสำเร็จ - My Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/success.css">
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✔️</div>
        <h1>จองโต๊ะสำเร็จ!</h1>
        <p class="subtitle">ขอบคุณที่เลือกใช้บริการร้านของเรา</p>

        <div class="details-box">
            <div class="detail-item">
                <span class="detail-label">ชื่อผู้จอง:</span>
                <span class="detail-value" id="res-name">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">เบอร์โทรศัพท์:</span>
                <span class="detail-value" id="res-phone">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">จำนวนคน:</span>
                <span class="detail-value" id="res-pax">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">วันที่:</span>
                <span class="detail-value" id="res-date">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">เวลา:</span>
                <span class="detail-value" id="res-time">-</span>
            </div>
            <div class="detail-item" style="margin-top: 15px;">
                <span class="detail-label">โต๊ะที่เลือก:</span>
                <span class="detail-value highlight" id="res-table">-</span>
            </div>
        </div>

        <a href="index.html" class="btn-home">กลับสู่หน้าหลัก</a>
    </div>

    <script src="js/success.js"></script>
</body>
</html>
