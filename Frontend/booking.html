<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มจองโต๊ะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/booking.css">
</head>
<body>
    <main class="page">
        <section class="booking-container">
            <p class="page-badge">Booking Form</p>
            <h1>แบบฟอร์มจองโต๊ะ</h1>
            <p class="form-intro">กรอกข้อมูลให้ครบก่อนเลือกโต๊ะที่ต้องการ</p>

            <form id="bookingForm" onsubmit="goToSelectSeat(event)">
                <div class="form-group">
                    <label for="name">ชื่อ - นามสกุล</label>
                    <input type="text" id="name" placeholder="กรอกชื่อผู้จอง" required>
                </div>

                <div class="form-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" placeholder="08xxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label for="guests">จำนวนคน</label>
                    <input type="number" id="guests" min="1" placeholder="ระบุจำนวนคน" required>
                </div>

                <div class="row-group">
                    <div class="form-group">
                        <label for="date">วันที่</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="time">เวลา</label>
                        <input type="time" id="time" required>
                    </div>
                </div>

                <div class="booking-note">
                    หมายเหตุ: การจอง 1 รอบ ใช้เวลา 3 ชั่วโมง
                </div>

                <button type="submit" class="btn-submit">ไปหน้าเลือกโต๊ะ</button>
            </form>

            <a href="index.html" class="back-link">กลับไปหน้าหลัก</a>
        </section>
    </main>

    <script src="js/booking.js"></script>
</body>
</html>
