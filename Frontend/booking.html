<!DOCTYPE html>
<html lang="th">

<head>

<title>จองโต๊ะ</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">

<body>

<header>
<h1>จองโต๊ะร้านอาหาร</h1>
</header>

<section class="booking">

<h2>กรอกข้อมูลการจอง</h2>

<form>

<label>ชื่อ</label>
<input type="text" placeholder="กรอกชื่อ">

<label>เบอร์โทร</label>
<input type="tel" placeholder="08xxxxxxxx">

<label>จำนวนคน</label>
<input type="number">

<label>วันที่</label>
<input type="date">

<label>เวลา</label>
<input type="time">

<button type="submit">จองโต๊ะ</button>

</form>

</section>

</body>

</html>
