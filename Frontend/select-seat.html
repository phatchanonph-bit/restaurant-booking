<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกมุมโปรด - My Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: linear-gradient(rgba(244, 244, 249, 0.9), rgba(244, 244, 249, 0.9)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');
            background-size: cover;
            background-position: center;
        }

        .seat-container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #b03a48;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        /* ส่วนแสดงสัญลักษณ์ (Legend) */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; }
        .color-box { width: 20px; height: 20px; border-radius: 4px; }
        .color-box.avail { background-color: #fff; border: 2px solid #ddd; }
        .color-box.sel { background-color: #ffcc00; }

        /* แผนผังโต๊ะอาหาร */
        .floor-plan {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 คอลัมน์ */
            gap: 15px;
            margin-bottom: 30px;
        }

        /* ปุ่มโต๊ะอาหาร */
        .table-box {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ตัวอักษรชื่อโต๊ะ */
        .table-name {
            font-weight: bold;
            font-size: 16px;
        }

        /* เอฟเฟกต์ตอนชี้เมาส์ */
        .table-box:hover {
            border-color: #b03a48;
            background-color: #fdf5f6;
            transform: translateY(-2px);
            color: #b03a48;
        }

        /* สถานะโต๊ะที่ถูกเลือก */
        .table-box.selected {
            background-color: #ffcc00;
            border-color: #e6b800;
            color: #8a2d38;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.4);
        }

        /* ปุ่มยืนยัน */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #b03a48;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .btn-submit:hover { background-color: #8a2d38; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { color: #b03a48; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="seat-container">
        <h1>เลือกมุมโปรดของคุณ</h1>
        <p class="subtitle">คลิกที่โต๊ะเพื่อเลือกที่นั่ง (โต๊ะทั้งหมดพร้อมให้บริการ!)</p>
        
        <div class="legend">
            <div class="legend-item"><div class="color-box avail"></div> ว่าง</div>
            <div class="legend-item"><div class="color-box sel"></div> เลือกแล้ว</div>
        </div>

        <div class="floor-plan">
            
            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 1</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 2</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 3</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 4</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 5</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 6</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 7</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 8</div>
            </div>

            <div class="table-box">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <path d="M 40 15 Q 50 5 60 15" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 40 85 Q 50 95 60 85" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="5"/>
                </svg>
                <div class="table-name">โต๊ะ 9</div>
            </div>

        </div>
        
        <button class="btn-submit" onclick="confirmSeat()">ยืนยันที่นั่ง</button>
        <a href="booking.html" class="back-link">← กลับไปแก้ไขข้อมูล</a>
    </div>

    <script>
        const tables = document.querySelectorAll('.table-box');

        tables.forEach(table => {
            table.addEventListener('click', () => {
                const isAlreadySelected = table.classList.contains('selected');
                tables.forEach(t => t.classList.remove('selected'));
                if (!isAlreadySelected) {
                    table.classList.add('selected');
                }
            });
        });

        // ---------------------------------------------------------
        // แก้ไขฟังก์ชัน confirmSeat() เพื่อยิงข้อมูลเข้า Database
        // ---------------------------------------------------------
       function confirmSeat() {
    const selectedTable = document.querySelector('.table-box.selected');
    
    if (selectedTable) {
        // 1. ดึงชื่อโต๊ะที่ลูกค้ากดเลือก (เช่น "โต๊ะ 1")
        const tableName = selectedTable.querySelector('.table-name').innerText;
        
        // เก็บลง localStorage ไว้โชว์ที่หน้า success.html
        localStorage.setItem('bookTable', tableName);
        
        // 2. ดึงข้อมูลจาก localStorage และจัดการให้เป็นรูปแบบที่ DB ต้องการ
        // ใช้ parseInt เพื่อตัดคำว่า "ท่าน" ออก ให้เหลือแต่ตัวเลขเพียวๆ เพื่อแก้ Error
        const rawPax = localStorage.getItem('bookPax') || "0";
        const cleanPax = parseInt(rawPax); 

        const data = {
            name: localStorage.getItem('bookName'),
            phone: localStorage.getItem('bookPhone'),
            people: cleanPax, // ส่งเฉพาะตัวเลข (Integer) เข้า Database
            date: localStorage.getItem('bookDate'),
            time: localStorage.getItem('bookTime'),
            table_number: tableName // ส่งชื่อโต๊ะไปบันทึกในคอลัมน์ table_number
        };

        // 3. ยิงข้อมูลทั้งหมดไปที่ Backend
        fetch("http://localhost:3000/book", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(result => {
            console.log("บันทึกสำเร็จ:", result);
            // 4. บันทึกเสร็จเรียบร้อย ค่อยไปหน้า success.html
            window.location.href = 'success.html'; 
        })
        .catch(error => {
            console.error("Error:", error);
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล โปรดลองอีกครั้ง");
        });

    } else {
        alert('กรุณาเลือกโต๊ะก่อนกดยืนยันครับ');
    }
}
    </script>

</body>
</html>
