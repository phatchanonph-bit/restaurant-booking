<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบแอดมิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>
    <main class="page">
        <section class="login-box">
            <p class="page-tag">Admin Login</p>
            <h1>เข้าสู่ระบบแอดมิน</h1>
            <p class="subtitle">ใช้สำหรับเข้าสู่หน้าจัดการรายการจองของร้านอาหาร</p>

            <form id="login-form" class="login-form">
                <label for="admin-username">ชื่อผู้ใช้</label>
                <input id="admin-username" type="text" placeholder="กรอก username" autocomplete="username" required>

                <label for="admin-password">รหัสผ่าน</label>
                <input id="admin-password" type="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" required>

                <p id="error-message" class="error-message" aria-live="polite"></p>

                <button id="login-button" type="submit">เข้าสู่ระบบ</button>
                <a href="index.html" class="back-link">กลับไปหน้าหลัก</a>
            </form>
        </section>
    </main>

    <script src="js/admin-login.js"></script>
</body>
</html>
