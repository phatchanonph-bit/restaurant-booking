<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้าน - จัดการการจอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            color: #b03a48;
            margin-bottom: 20px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #fdf5f6;
            color: #b03a48;
        }

        /* ปรับแต่งสถานะให้ดูง่าย */
        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            min-width: 80px;
        }
        .status.pending { background-color: #fff3cd; color: #856404; }
        .status.approved { background-color: #d4edda; color: #155724; }
        .status.rejected { background-color: #f8d7da; color: #721c24; }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Noto Sans Thai', sans-serif;
            font-weight: bold;
            color: white;
            margin: 2px;
            transition: 0.2s;
        }
        .btn-approve { background-color: #28a745; }
        .btn-reject { background-color: #dc3545; }
        .btn-delete { background-color: #6c757d; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        .empty-message {
            text-align: center;
            color: #888;
            margin-top: 30px;
            padding: 40px;
            border: 2px dashed #ddd;
            border-radius: 10px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>จัดการคิวจองโต๊ะ (Admin Panel)</h1>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ชื่อผู้จอง</th>
                    <th>เบอร์โทร</th>
                    <th>จำนวน</th>
                    <th>วันที่ - เวลา</th>
                    <th>โต๊ะ</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="booking-list">
                </tbody>
        </table>
        
        <div id="no-data" class="empty-message" style="display: none;">ไม่มีรายการจองในระบบขณะนี้</div>

        <a href="index.html" class="back-link">← กลับไปหน้าหลัก</a>
    </div>

    <script>
        // เปลี่ยนเป็น URL ของ Backend ของคุณ (เช่น http://localhost:3000)
        const API_URL = "http://localhost:3000";

        // ฟังก์ชันโหลดข้อมูลจาก Database
        async function loadBookings() {
            try {
                const res = await fetch(`${API_URL}/admin/bookings`);
                const data = await res.json();
                
                const tableBody = document.getElementById('booking-list');
                const noDataMsg = document.getElementById('no-data');
                
                tableBody.innerHTML = '';

                if (data.length === 0) {
                    noDataMsg.style.display = 'block';
                    return;
                }

                noDataMsg.style.display = 'none';
                data.forEach(book => {
                    // กำหนดสีตามสถานะใน DB
                    let statusClass = 'pending';
                    if(book.status === 'ยืนยันแล้ว') statusClass = 'approved';
                    if(book.status === 'ปฏิเสธแล้ว') statusClass = 'rejected';

                    const row = `
                        <tr>
                            <td>${book.id}</td>
                            <td>${book.name}</td>
                            <td>${book.phone}</td>
                            <td>${book.people} ท่าน</td>
                            <td>${book.date}<br><small>${book.time}</small></td>
                            <td><strong>${book.table_number || 'ไม่ระบุ'}</strong></td>
                            <td><span class="status ${statusClass}">${book.status || 'รอยืนยัน'}</span></td>
                            <td>
                                <button class="btn btn-approve" onclick="updateStatus(${book.id}, 'ยืนยันแล้ว')">✔️ ยืนยัน</button>
                                <button class="btn btn-reject" onclick="updateStatus(${book.id}, 'ปฏิเสธแล้ว')">❌ ปฏิเสธ</button>
                                <button class="btn btn-delete" onclick="deleteBooking(${book.id})">ลบ</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        // ฟังก์ชันอัปเดตสถานะ (บันทึกลง DB)
        async function updateStatus(id, newStatus) {
            try {
                await fetch(`${API_URL}/admin/update-status`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, status: newStatus })
                });
                loadBookings(); // รีเฟรชข้อมูล
            } catch (err) {
                alert("ไม่สามารถอัปเดตสถานะได้");
            }
        }

        // ฟังก์ชันลบรายการ
        async function deleteBooking(id) {
            if (confirm("ต้องการลบรายการจองที่ ID: " + id + " หรือไม่?")) {
                try {
                    await fetch(`${API_URL}/admin/delete/${id}`, { method: "DELETE" });
                    loadBookings();
                } catch (err) {
                    alert("ไม่สามารถลบข้อมูลได้");
                }
            }
        }

        // โหลดข้อมูลทันทีที่เปิดหน้า
        window.onload = loadBookings;
    </script>
</body>
</html>
